<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>기사 보기 - 뉴스의 창</title>
  <meta name="description" content="뉴스의 창 공개 기사 상세 페이지입니다.">
  <link rel="canonical" href="https://www.newswindow.kr/article.html">
  <link rel="stylesheet" href="styles.css">
  <style>
    .article-wrap { max-width: 960px; margin: 24px auto 48px; background:#fff; padding: 24px; border:1px solid #e6e6e6; border-radius: 8px; }
    .article-top-link { display:inline-block; margin-bottom: 12px; color:#2d7dd2; text-decoration:none; }
    .article-top-link:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="article-wrap">
    <a class="article-top-link" href="/index.html">← 메인으로</a>
    <article id="articleView">
      <h1 class="article-title">기사 불러오는 중...</h1>
    </article>
  </div>
  <script src="nw-article-render.js"></script>
  <script src="nw-seo.js"></script>
  <script>
    (function () {
      const NW_PRODUCTION_API_ORIGIN = 'https://newswindow-backend.onrender.com';
      function nwIsProductionNewswindowHost(hostname) {
        var hl = (hostname || '').trim().toLowerCase();
        if (!hl) return false;
        return hl === 'newswindow.kr' || hl.slice(-14) === '.newswindow.kr';
      }
      const API = (function () {
        try {
          if (typeof window !== 'undefined' && window.NW_API_ORIGIN != null && String(window.NW_API_ORIGIN).trim()) {
            return String(window.NW_API_ORIGIN).trim().replace(/\/+$/, '');
          }
        } catch (e00) {}
        try {
          const host = String(location.hostname || '').trim();
          const h = host.toLowerCase();
          if (!h) return 'http://127.0.0.1:3000';
          if (h === 'localhost' || h === '127.0.0.1' || h === '::1') return 'http://127.0.0.1:3000';
          if (/^192\.168\.\d{1,3}\.\d{1,3}$/.test(h) || /^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(h)) return 'http://127.0.0.1:3000';
          if (nwIsProductionNewswindowHost(h)) return NW_PRODUCTION_API_ORIGIN;
        } catch (eeee) {}
        return '';
      })();
      const NW_PUBLIC_UPLOAD_ORIGIN = (function () {
        try {
          if (typeof window === 'undefined' || window.NW_PUBLIC_UPLOAD_ORIGIN == null) return '';
          return String(window.NW_PUBLIC_UPLOAD_ORIGIN).trim().replace(/\/+$/, '');
        } catch (e) {
          return '';
        }
      })();
      const STORAGE_KEY = 'nw_public_article_id';
      const view = document.getElementById('articleView');

      function resolveArticleId() {
        try {
          const q = new URLSearchParams(location.search).get('id');
          if (q != null && String(q).trim() !== '') return String(q).trim();
        } catch (e) {}
        const raw = (location.hash || '').replace(/^#/, '').trim();
        if (raw) {
          if (/^id=/i.test(raw)) {
            const v = raw.replace(/^id=/i, '').trim();
            if (v) return v;
          }
          const m = raw.match(/^(\d+)$/);
          if (m) return m[1];
        }
        try {
          const s = sessionStorage.getItem(STORAGE_KEY);
          if (s != null && String(s).trim() !== '') return String(s).trim();
        } catch (e) {}
        return '';
      }

      const id = resolveArticleId();
      if (!id) {
        view.innerHTML = '<h1 class="article-title">잘못된 접근입니다.</h1>';
        return;
      }

      function runSeoAndRelated(a) {
        if (typeof nwSeoApplyArticlePage === 'function') {
          try {
            nwSeoApplyArticlePage(a, id, API, NW_PUBLIC_UPLOAD_ORIGIN);
          } catch (e1) {}
        }
        if (window.NW_ARTICLE_RENDER && NW_ARTICLE_RENDER.fetchRelatedArticles) {
          NW_ARTICLE_RENDER.fetchRelatedArticles(API, id, a.category, document.getElementById('nwRelatedMount'));
        }
      }

      fetch(API + '/api/articles/public/' + encodeURIComponent(id))
        .then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || '\uae30\uc0ac\ub97c \ubd88\ub7ec\uc624\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4.');
          return data;
        })
        .then((a) => {
          try {
            sessionStorage.removeItem(STORAGE_KEY);
          } catch (e) {}
          if (window.NW_ARTICLE_RENDER && NW_ARTICLE_RENDER.buildDetailHtml) {
            view.className = 'nw-article-detail__inner';
            view.innerHTML = NW_ARTICLE_RENDER.buildDetailHtml(a, {
              categoryLabel: a.category || '뉴스',
              uploadOrigin: NW_PUBLIC_UPLOAD_ORIGIN,
              apiOrigin: API,
            });
            runSeoAndRelated(a);
            return;
          }
          view.innerHTML = '<h1 class="article-title">모듈 로드 실패</h1>';
        })
        .catch((e) => {
          try {
            sessionStorage.removeItem(STORAGE_KEY);
          } catch (err) {}
          view.innerHTML = '<h1 class="article-title">기사 로드 실패</h1><p>' + String(e.message || e) + '</p>';
        });
    })();
  </script>
</body>
</html>
