# Render Blueprint — https://render.com/docs/blueprint-spec
#
# 운영 기사·광고 API 영속성: Supabase(Postgres + Storage). 환경 변수는 대시보드에서 설정:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, JWT_SECRET, CORS_ORIGIN
#   (선택) SUPABASE_BANNERS_BUCKET, PUBLIC_UPLOAD_ORIGIN / BACKEND_PUBLIC_URL
#
# 구버전: NW_ARTICLES_JSON_PATH / NW_ADS_JSON_PATH 는 API에서 더 이상 사용하지 않습니다.
# NW_LEGACY_FILE_DB 는 미사용(삭제 권장). 로컬 전용 레거시는 NW_DEV_LEGACY_FILE_DB(비운영만).
#
# Persistent Disk는 업로드 파일을 인스턴스 디스크에만 둘 때만 필요할 수 있습니다.
# 광고 이미지는 Storage 사용 시 디스크 없이도 재배포 후 URL이 유지됩니다.

services:
  - type: web
    name: newswindow-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    # disk:
