# Render Blueprint — https://render.com/docs/blueprint-spec
# 새 서비스를 이 파일로 만들거나, 기존 서비스에 아래 env·디스크를 수동으로 동일하게 맞출 것.
#
# 중요:
# - Persistent Disk는 Render 정책상 유료 Web Service에서 사용하는 것이 일반적이다.
#   Free 인스턴스만 쓰고 디스크를 붙이지 않으면 NW_* 경로가 에페메럴 스토리지를 가리켜
#   재배포·재시작 시 ads.json / articles.json 이 초기화될 수 있다.
# - 서비스 이름·rootDir·build/start 명령은 프로젝트에 맞게 수정한다.

services:
  - type: web
    name: newswindow-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NW_ADS_JSON_PATH
        value: /data/ads.json
      - key: NW_ARTICLES_JSON_PATH
        value: /data/articles.json
    disk:
      name: newswindow-persist
      mountPath: /data
      sizeGB: 1
