<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어린이회원 로그인 - 뉴스의창</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .nw-wrap { max-width: 420px; margin: 60px auto; padding: 0 20px; }
    .nw-title { font-size: 22px; font-weight: 700; margin-bottom: 18px; text-align: center; }
    .nw-form .row { margin-bottom: 12px; }
    .nw-form label { display:block; font-size:13px; margin-bottom:6px; font-weight:600; }
    .nw-form input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:4px; font-size:14px; }
    .nw-form button { width:100%; padding:12px; background:#2d7dd2; color:#fff; border:none; border-radius:4px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }
    .nw-form button:hover { background:#246bb8; }
    .nw-back { text-align:center; margin-top:14px; }
    .note { font-size:13px; color:#666; margin-top:8px; text-align:center; }
  </style>
</head>
<body>
  <div class="nw-wrap">
    <h1 class="nw-title">어린이회원 로그인</h1>
    <form class="nw-form" id="loginForm">
      <div class="row">
        <label>아이디</label>
        <input type="text" id="userid" name="userid" required placeholder="아이디 입력" />
      </div>
      <div class="row">
        <label>비밀번호</label>
        <input type="password" id="password" name="password" required placeholder="비밀번호 입력" />
      </div>
      <div id="errorMsg" class="error" style="display:none;"></div>
      <button type="submit">로그인</button>
    </form>
    <p class="note">어린이회원은 보호자 동의가 필요한 서비스입니다.</p>
    <div class="nw-back"><a href="../index.html">← 메인으로 돌아가기</a></div>
  </div>

  <script src="../config.js"></script>
  <script>
    const API = (window.NW_CONFIG && window.NW_CONFIG.API_BASE) ? window.NW_CONFIG.API_BASE : 'http://127.0.0.1:3001';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userid = document.getElementById('userid').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userid, password })
        });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) {
          err.textContent = data.error || '로그인 실패';
          err.style.display = 'block';
          return;
        }
        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('role', data.role || 'child');
        localStorage.setItem('name', data.name || '');
        window.location.href = '../index.html';
      } catch (e) {
        err.textContent = '서버에 연결할 수 없습니다.';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
