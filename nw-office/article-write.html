<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기사 작성 - 뉴스의창</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { box-sizing: border-box; }
    .nw-wrap { max-width: 900px; margin: 24px auto; padding: 0 24px; width: 100%; }
    .nw-form { width: 100%; }
    .nw-form .row, #articleForm .nw-form-row { margin-bottom: 20px; width: 100%; display: block; }
    .nw-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .nw-title { font-size: 20px; font-weight: 700; }
    .nw-back { color: #2d7dd2; cursor: pointer; }
    .nw-form label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: 600; color: #333; }
    #articleForm input[type="text"], #articleForm input[type="email"], #articleForm input:not([type="file"]),
    #articleForm select, #articleForm textarea {
      width: 100% !important; max-width: 100%; min-width: 0; padding: 12px 14px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 15px; transition: border-color .15s; display: block; box-sizing: border-box;
    }
    .nw-form input:focus, .nw-form select:focus, .nw-form textarea:focus {
      outline: none; border-color: #2d7dd2; box-shadow: 0 0 0 2px rgba(45,125,210,.15);
    }
    .nw-form textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
    .nw-form input[readonly] { background: #f8f9fa; color: #666; }
    #articleForm .file-wrap {
      width: 100% !important; max-width: 100%; min-width: 0; padding: 16px; border: 2px dashed #ddd; border-radius: 8px;
      background: #fafafa; text-align: center; transition: border-color .15s, background .15s;
    }
    .nw-form .file-wrap:hover, .nw-form .file-wrap.dragover { border-color: #2d7dd2; background: #f0f7ff; }
    .nw-form .file-wrap input[type="file"] { display: none; }
    .nw-form .file-trigger { display: inline-block; padding: 8px 16px; background: #2d7dd2; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .nw-form .file-trigger:hover { background: #246bb8; }
    .nw-form .file-list { margin-top: 8px; font-size: 13px; color: #666; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .nw-form .file-list .file-name { color: #333; }
    .nw-form .file-delete { padding: 4px 10px; font-size: 12px; background: #dc3545; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .nw-form .file-delete:hover { background: #c82333; }
    .content-block { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
    .content-block:last-of-type { border-bottom: none; }
    .nw-btns { display: flex; gap: 12px; margin-top: 28px; padding-top: 24px; border-top: 1px solid #eee; flex-wrap: wrap; }
    .nw-btn { padding: 12px 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .nw-btn-draft { background: #6c757d; color: #fff; }
    .nw-btn-spell { background: #8b4513; color: #fff; }
    .nw-btn-spell:disabled { opacity: 0.65; cursor: not-allowed; }
    .nw-btn-preview { background: #6f42c1; color: #fff; }
    .nw-btn-complete { background: #2d7dd2; color: #fff; }
    .nw-btn-submit { background: #198754; color: #fff; }
    .nw-btn:hover { opacity: 0.9; }
    .nw-error { color: #c00; font-size: 13px; margin-top: 8px; }
    .nw-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; overflow: auto; }
    .nw-modal.show { display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px; }
    .nw-modal-inner { background: #fff; border-radius: 8px; padding: 32px; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .nw-modal-close { float: right; cursor: pointer; font-size: 24px; color: #666; line-height: 1; }
    .preview-article h1 { font-size: 22px; margin: 0 0 8px; line-height: 1.4; }
    .preview-article .preview-subtitle { font-size: 16px; font-weight: 700; color: #555; margin-bottom: 12px; white-space: pre-line; }
    .preview-article .preview-meta { font-size: 13px; color: #888; margin-bottom: 20px; }
    .preview-article .preview-body { font-size: 15px; line-height: 1.8; }
    .preview-article .preview-body p { margin: 0 0 16px; }
    .preview-article .preview-img { max-width: 100%; height: auto; border-radius: 6px; margin: 12px 0; display: block; }
    .preview-article .preview-img-caption { font-size: 13px; color: #666; margin: -4px 0 16px 0; line-height: 1.5; }
    .nw-form .img-caption { margin-top: 8px; }
    .nw-form .caption-preview { display: block; font-size: 13px; color: #666; margin-top: 6px; line-height: 1.5; min-height: 1.5em; }
    /* 맞춤법 검사 모달 */
    .spell-modal-inner { max-width: 920px; }
    .spell-modal-inner h2 { margin: 0 0 8px; font-size: 18px; }
    .spell-modal-intro { font-size: 13px; color: #666; margin: 0 0 16px; line-height: 1.5; }
    .spell-status { font-size: 14px; margin-bottom: 16px; min-height: 1.4em; }
    .spell-status.is-loading { color: #2d7dd2; }
    .spell-status.is-ok { color: #2e7d32; }
    .spell-status.is-err { color: #c62828; }
    .spell-field-block { margin-bottom: 22px; border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; background: #fff; }
    .spell-field-title { margin: 0; padding: 10px 14px; font-size: 14px; font-weight: 700; background: #f4f6f8; border-bottom: 1px solid #e8e8e8; color: #333; }
    .spell-compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    @media (max-width: 768px) {
      .spell-compare-row { grid-template-columns: 1fr; }
    }
    .spell-col { padding: 12px 14px; border-right: 1px solid #eee; min-height: 56px; }
    .spell-compare-row .spell-col:last-child { border-right: none; }
    .spell-col-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .spell-plain { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.65; color: #222; margin: 0; }
    .spell-corrected-html { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.65; color: #222; }
    .spell-corrected-html .spell-changed,
    .spell-modal-inner .spell-changed { color: #c00; font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }
    .spell-body-block { margin-bottom: 12px; }
    .spell-body-block:last-child { margin-bottom: 0; }
    .spell-body-label { display: block; font-size: 12px; color: #555; margin-bottom: 6px; }
    .spell-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; padding-top: 18px; border-top: 1px solid #eee; }
    .spell-actions .nw-btn-apply { padding: 10px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; background: #2d7dd2; color: #fff; }
    .spell-actions .nw-btn-apply.secondary { background: #5c6bc0; }
    .spell-actions .nw-btn-apply.outline { background: #fff; color: #333; border: 1px solid #ccc; }
    .spell-actions .nw-btn-apply:hover:not(:disabled) { opacity: 0.92; }
    .spell-actions .nw-btn-apply:disabled { opacity: 0.5; cursor: not-allowed; }
    .spell-actions .nw-btn-apply.tertiary { background: #fff; color: #1565c0; border: 2px solid #1565c0; }
    .spell-actions .nw-btn-apply.tertiary:hover:not(:disabled) { background: #e3f2fd; }
    .spell-edit-panel { margin-top: 18px; border: 1px solid #cfe8fc; border-radius: 8px; background: #f8fbff; overflow: hidden; }
    .spell-edit-panel.is-collapsed .spell-edit-fields { display: none; }
    .spell-edit-panel-head { padding: 12px 14px; background: #e8f4fd; border-bottom: 1px solid #cfe8fc; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; }
    .spell-edit-panel-title { margin: 0; font-size: 14px; font-weight: 700; color: #0d47a1; }
    .spell-edit-panel-hint { margin: 0; font-size: 12px; color: #455a64; line-height: 1.5; flex: 1 1 100%; order: 3; }
    .spell-edit-fields { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
    .spell-edit-fields label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: #37474f; }
    .spell-edit-fields input[type="text"],
    .spell-edit-fields textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #b0bec5; border-radius: 6px; font-size: 14px; line-height: 1.55; font-family: inherit; }
    .spell-edit-fields textarea { min-height: 100px; resize: vertical; }
  </style>
</head>
<body>
  <div class="nw-wrap">
    <div class="nw-header">
      <h1 class="nw-title">기사 작성</h1>
      <span class="nw-back" id="btnBack">← 대시보드로 돌아가기</span>
    </div>
    <form id="articleForm" class="nw-form" onsubmit="return false;">
      <div class="row nw-form-row">
        <label>제목</label>
        <input type="text" id="title" required placeholder="기사 제목을 입력하세요" />
      </div>
      <div class="row nw-form-row">
        <label>부제목</label>
        <textarea id="subtitle" rows="2" placeholder="부제목을 입력하세요 (두 행까지)"></textarea>
      </div>
      <div class="row nw-form-row">
        <label>기자명</label>
        <input type="text" id="authorName" readonly placeholder="자동입력" />
      </div>
      <div class="row nw-form-row">
        <label>카테고리</label>
        <select id="category">
          <option value="">선택하세요</option>
          <option value="정치-최신뉴스">정치-최신뉴스</option>
          <option value="정치-지방자치">정치-지방자치</option>
          <option value="정치-외교">정치-외교</option>
          <option value="정치-북한">정치-북한</option>
          <option value="경제-금융">경제-금융</option>
          <option value="경제-부동산">경제-부동산</option>
          <option value="경제-AI/IT">경제-AI/IT</option>
          <option value="경제-자동차">경제-자동차</option>
          <option value="사회-시사">사회-시사</option>
          <option value="사회-건강/의료">사회-건강/의료</option>
          <option value="사회-교육">사회-교육</option>
          <option value="사회-리조트&amp;테마">사회-리조트&amp;테마</option>
          <option value="문화-대중음악">문화-대중음악</option>
          <option value="문화-행사&amp;공연">문화-행사&amp;공연</option>
          <option value="문화-갤러리">문화-갤러리</option>
          <option value="문화-문학">문화-문학</option>
          <option value="뉴스포커스">뉴스포커스</option>
          <option value="전국-서울">전국-서울</option>
          <option value="전국-경기">전국-경기</option>
          <option value="전국-강원">전국-강원</option>
          <option value="전국-충청">전국-충청</option>
          <option value="전국-영남">전국-영남</option>
          <option value="전국-호남">전국-호남</option>
          <option value="전국-제주">전국-제주</option>
          <option value="이슈-연예&amp;스포츠">이슈-연예&amp;스포츠</option>
          <option value="이슈-뷰티">이슈-뷰티</option>
          <option value="이슈-여행&amp;음식">이슈-여행&amp;음식</option>
          <option value="국제">국제</option>
          <option value="칼럼">칼럼</option>
          <option value="포토뉴스&amp;영상">포토뉴스&amp;영상</option>
        </select>
      </div>

      <div class="content-block">
        <label>이미지 1 첨부</label>
        <div class="file-wrap" id="fileWrap1">
          <input type="file" id="image1" accept="image/*" />
          <span class="file-trigger" id="fileTrigger1">이미지 파일 선택</span>
          <div class="file-list" id="fileList1"></div>
        </div>
        <div class="img-caption">
          <label>이미지 1 설명</label>
          <input type="text" id="image1_caption" placeholder="예: 서울의 한 오피스텔 건물에서 관계자가 전기 계량기를 살펴보고 있다." />
          <span class="caption-preview" id="image1_caption_preview" aria-live="polite"></span>
        </div>
      </div>
      <div class="row nw-form-row content-block">
        <label>내용 1</label>
        <textarea id="content1" placeholder="첫 번째 본문 내용을 입력하세요" data-article-plain-body="1"></textarea>
      </div>

      <div class="content-block">
        <label>이미지 2 첨부</label>
        <div class="file-wrap" id="fileWrap2">
          <input type="file" id="image2" accept="image/*" />
          <span class="file-trigger" id="fileTrigger2">이미지 파일 선택</span>
          <div class="file-list" id="fileList2"></div>
        </div>
        <div class="img-caption">
          <label>이미지 2 설명</label>
          <input type="text" id="image2_caption" placeholder="예: 서울의 한 오피스텔 건물에서 관계자가 전기 계량기를 살펴보고 있다." />
          <span class="caption-preview" id="image2_caption_preview" aria-live="polite"></span>
        </div>
      </div>
      <div class="row nw-form-row content-block">
        <label>내용 2</label>
        <textarea id="content2" placeholder="두 번째 본문 내용을 입력하세요" data-article-plain-body="1"></textarea>
      </div>

      <div class="content-block">
        <label>이미지 3 첨부</label>
        <div class="file-wrap" id="fileWrap3">
          <input type="file" id="image3" accept="image/*" />
          <span class="file-trigger" id="fileTrigger3">이미지 파일 선택</span>
          <div class="file-list" id="fileList3"></div>
        </div>
        <div class="img-caption">
          <label>이미지 3 설명</label>
          <input type="text" id="image3_caption" placeholder="예: 서울의 한 오피스텔 건물에서 관계자가 전기 계량기를 살펴보고 있다." />
          <span class="caption-preview" id="image3_caption_preview" aria-live="polite"></span>
        </div>
      </div>
      <div class="row nw-form-row content-block">
        <label>내용 3</label>
        <textarea id="content3" placeholder="세 번째 본문 내용을 입력하세요" data-article-plain-body="1"></textarea>
      </div>

      <div id="errorMsg" class="nw-error" style="display:none;"></div>
      <div class="nw-btns">
        <button type="button" class="nw-btn nw-btn-draft" id="btnDraft">임시저장</button>
        <button type="button" class="nw-btn nw-btn-spell" id="btnSpell">맞춤법 검사</button>
        <button type="button" class="nw-btn nw-btn-preview" id="btnPreview">미리보기</button>
        <button type="button" class="nw-btn nw-btn-complete" id="btnComplete">작성완료</button>
        <button type="button" class="nw-btn nw-btn-submit" id="btnSubmit">송고</button>
      </div>
    </form>
  </div>

  <div class="nw-modal" id="previewModal">
    <div class="nw-modal-inner">
      <span class="nw-modal-close" id="previewModalClose">×</span>
      <h2 style="margin:0 0 20px;">미리보기</h2>
      <div class="preview-article" id="previewContent"></div>
    </div>
  </div>

  <div class="nw-modal" id="spellModal" aria-hidden="true">
    <div class="nw-modal-inner spell-modal-inner">
      <span class="nw-modal-close" id="spellModalClose" role="button" tabindex="0" aria-label="닫기">×</span>
      <h2>맞춤법 검사 결과</h2>
      <p class="spell-modal-intro">서버 샘플 교정(띄어쓰기·자주 틀리는 표기 일부)입니다. 운영 시 외부 맞춤법 API로 교체할 수 있습니다. 교정된 부분은 <span class="spell-changed">적색</span>으로 표시됩니다.</p>
      <div id="spellStatus" class="spell-status" role="status"></div>
      <div id="spellCompareRoot"></div>
      <div id="spellEditPanel" class="spell-edit-panel is-collapsed" aria-hidden="true">
        <div class="spell-edit-panel-head">
          <h3 class="spell-edit-panel-title">교정문 직접 수정</h3>
          <p class="spell-edit-panel-hint">서버가 제안한 교정문을 그대로 쓰거나, 아래에서 문장을 고친 뒤 「전체 반영」등으로 기사 입력란에 넣을 수 있습니다.</p>
        </div>
        <div class="spell-edit-fields">
          <label>제목
            <input type="text" id="spellEditTitle" autocomplete="off" />
          </label>
          <label>부제목
            <input type="text" id="spellEditSubtitle" autocomplete="off" />
          </label>
          <div id="spellEditBodyPlainWrap">
            <label>본문 · 내용 1
              <textarea id="spellEditBody1" rows="4"></textarea>
            </label>
            <label>본문 · 내용 2
              <textarea id="spellEditBody2" rows="4"></textarea>
            </label>
            <label>본문 · 내용 3
              <textarea id="spellEditBody3" rows="4"></textarea>
            </label>
          </div>
          <div id="spellEditBodyRichWrap" hidden>
            <label>본문 (리치텍스트와 동일 한 블록)
              <textarea id="spellEditBodyRich" rows="10"></textarea>
            </label>
          </div>
        </div>
      </div>
      <div class="spell-actions">
        <button type="button" class="nw-btn-apply tertiary" id="spellToggleEdit">직접수정</button>
        <button type="button" class="nw-btn-apply" id="spellApplyAll">전체 반영</button>
        <button type="button" class="nw-btn-apply secondary" id="spellApplyTitle">제목만 반영</button>
        <button type="button" class="nw-btn-apply secondary" id="spellApplySubtitle">부제목만 반영</button>
        <button type="button" class="nw-btn-apply secondary" id="spellApplyBody">본문만 반영</button>
        <button type="button" class="nw-btn-apply outline" id="spellModalCloseBtn">닫기</button>
      </div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script>
    const API = (window.NW_CONFIG && window.NW_CONFIG.API_BASE) ? window.NW_CONFIG.API_BASE : 'http://127.0.0.1:3001';
    const token = localStorage.getItem('accessToken');
    const role = localStorage.getItem('role');
    const name = localStorage.getItem('name') || '';

    if (!token || role !== 'reporter') {
      window.location.href = 'login.html?role=reporter';
    }

    document.getElementById('authorName').value = name;

    function updateImageSlotDisplay(n) {
      const input = document.getElementById('image' + n);
      const list = document.getElementById('fileList' + n);
      const loaded = window._loadedImages || {};
      const loadedImg = loaded['image' + n];
      const hasFile = input.files && input.files[0];
      const hasLoaded = loadedImg && String(loadedImg).trim();
      if (!hasFile && !hasLoaded) {
        list.innerHTML = '';
        return;
      }
      const label = hasFile ? `선택됨: ${input.files[0].name}` : '저장된 이미지';
      list.innerHTML = `<span class="file-name">${label}</span><button type="button" class="file-delete" data-slot="${n}">삭제</button>`;
      list.querySelector('.file-delete').addEventListener('click', () => {
        input.value = '';
        if (window._loadedImages) window._loadedImages['image' + n] = '';
        updateImageSlotDisplay(n);
      });
    }

    [1,2,3].forEach(n => {
      const wrap = document.getElementById('fileWrap' + n);
      const input = document.getElementById('image' + n);
      const trigger = document.getElementById('fileTrigger' + n);
      const list = document.getElementById('fileList' + n);
      trigger.addEventListener('click', () => input.click());
      input.addEventListener('change', () => updateImageSlotDisplay(n));
      wrap.addEventListener('dragover', (e) => { e.preventDefault(); wrap.classList.add('dragover'); });
      wrap.addEventListener('dragleave', () => wrap.classList.remove('dragover'));
      wrap.addEventListener('drop', (e) => {
        e.preventDefault();
        wrap.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
          input.files = e.dataTransfer.files;
          updateImageSlotDisplay(n);
        }
      });
    });
    [1, 2, 3].forEach(n => {
      const input = document.getElementById('image' + n + '_caption');
      if (input) input.addEventListener('input', () => updateCaptionPreview(n));
    });

    const params = new URLSearchParams(location.search);
    // URL 파라미터 변형(공백/해시 혼입 등)에 대비해 숫자 ID만 정규화
    let editIdRaw = params.get('id');
    let editId = (editIdRaw && String(editIdRaw).match(/\d+/)) ? String(String(editIdRaw).match(/\d+/)[0]) : '';
    if (editId) {
      document.querySelector('.nw-title').textContent = '기사 수정';
    }

    document.getElementById('btnBack').addEventListener('click', () => {
      window.location.href = 'reporter.html';
    });

    function showErr(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function getCaptionSuffix() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return ' ' + y + '.' + m + '.' + day + ' (ⓒ뉴스의창, 무단 전재-재배포 금지)';
    }
    function stripCaptionSuffix(str) {
      if (!str || typeof str !== 'string') return '';
      return str.replace(/\s+\d{4}\.\d{2}\.\d{2}\s*\(ⓒ뉴스의창[^)]*\)\s*$/, '').trim();
    }
    function updateCaptionPreview(n) {
      const input = document.getElementById('image' + n + '_caption');
      const preview = document.getElementById('image' + n + '_caption_preview');
      if (!input || !preview) return;
      const v = input.value.trim();
      preview.textContent = v ? v + getCaptionSuffix() : '';
    }
    function getFullCaption(inputValue) {
      const v = (inputValue || '').trim();
      return v ? v + getCaptionSuffix() : '';
    }

    function getFormData() {
      const data = {
        title: document.getElementById('title').value.trim(),
        subtitle: document.getElementById('subtitle').value.trim(),
        category: document.getElementById('category').value,
        content1: document.getElementById('content1').value.trim(),
        content2: document.getElementById('content2').value.trim(),
        content3: document.getElementById('content3').value.trim(),
        image1_caption: getFullCaption(document.getElementById('image1_caption').value),
        image2_caption: getFullCaption(document.getElementById('image2_caption').value),
        image3_caption: getFullCaption(document.getElementById('image3_caption').value)
      };
      return data;
    }

    async function fileToBase64(file) {
      return new Promise((res) => {
        if (!file) { res(''); return; }
        const r = new FileReader();
        r.onload = () => res(r.result || '');
        r.readAsDataURL(file);
      });
    }

    async function getFormDataWithImages() {
      const d = getFormData();
      const loaded = window._loadedImages || {};
      const f1 = document.getElementById('image1').files[0];
      const f2 = document.getElementById('image2').files[0];
      const f3 = document.getElementById('image3').files[0];
      d.image1 = f1 ? await fileToBase64(f1) : (loaded.image1 || '');
      d.image2 = f2 ? await fileToBase64(f2) : (loaded.image2 || '');
      d.image3 = f3 ? await fileToBase64(f3) : (loaded.image3 || '');
      return d;
    }

    function fillArticleToForm(a) {
      document.getElementById('title').value = a.title || '';
      document.getElementById('subtitle').value = a.subtitle || '';
      document.getElementById('category').value = a.category || '';
      document.getElementById('content1').value = a.content1 || '';
      document.getElementById('content2').value = a.content2 || '';
      document.getElementById('content3').value = a.content3 || '';
      document.getElementById('image1_caption').value = stripCaptionSuffix(a.image1_caption || '');
      document.getElementById('image2_caption').value = stripCaptionSuffix(a.image2_caption || '');
      document.getElementById('image3_caption').value = stripCaptionSuffix(a.image3_caption || '');
      [1, 2, 3].forEach(updateCaptionPreview);
      window._loadedImages = { image1: a.image1, image2: a.image2, image3: a.image3 };
      [1, 2, 3].forEach(updateImageSlotDisplay);
    }

    async function loadArticle() {
      if (!editId) return;
      try {
        const res = await fetch(`${API}/api/articles/${editId}`, { headers: { Authorization: `Bearer ${token}` } });
        if (res.status === 401) { window.location.href = 'login.html?role=reporter'; return; }
        if (res.ok) {
          const a = await res.json();
          fillArticleToForm(a);
          return;
        }
        // 상세 API 실패 시 내 기사 목록에서 동일 ID를 찾아 복구 로드
        const listRes = await fetch(`${API}/api/articles`, { headers: { Authorization: `Bearer ${token}` } });
        if (listRes.status === 401) { window.location.href = 'login.html?role=reporter'; return; }
        const list = await listRes.json().catch(() => ([]));
        const fromList = Array.isArray(list) ? list.find(x => String(x.id) === String(editId)) : null;
        if (fromList) {
          fillArticleToForm(fromList);
          return;
        }
        showErr('기사 내용을 불러오지 못했습니다. 대시보드에서 다시 선택해주세요.');
        alert('저장된 기사 데이터를 불러오지 못했습니다. 다시 로그인 후 시도해주세요.');
      } catch (e) {
        showErr('기사 내용을 불러오는 중 오류가 발생했습니다.');
        alert('기사 로드 중 오류가 발생했습니다.');
      }
    }
    loadArticle();
    if (!window._loadedImages) window._loadedImages = {};

    async function saveArticle(status, opts = {}) {
      const d = await getFormDataWithImages();
      if (!d.title) { showErr('제목을 입력해주세요.'); return; }
      showErr('');
      try {
        let res;
        if (editId) {
          res = await fetch(`${API}/api/articles/${editId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ ...d, status })
          });
        } else {
          res = await fetch(`${API}/api/articles`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ ...d, status })
          });
        }
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) { window.location.href = 'login.html?role=reporter'; return; }
        if (!res.ok) { showErr(data.error || '저장 실패'); return; }
        if (!editId) {
          if (status === 'draft') {
            editId = String(data.id);
            history.replaceState(null, '', '?id=' + editId);
          } else {
            window.location.search = '?id=' + data.id;
          }
        }
        if (opts.redirectToDashboard) {
          alert('송고되었습니다. 편집장 승인을 기다립니다.');
          window.location.href = 'reporter.html';
          return;
        }
        if (status === 'draft') alert('임시저장되었습니다. (원문/이미지 저장 완료)');
        else if (status === 'pending') alert('작성완료로 저장되었습니다. (원문/이미지 저장 완료)');
        else alert('저장되었습니다.');
      } catch (e) { showErr('서버에 연결할 수 없습니다.'); }
    }

    function showPreview() {
      const title = document.getElementById('title').value.trim() || '(제목 없음)';
      const subtitle = document.getElementById('subtitle').value.trim();
      const author = name || '기자';
      const category = document.getElementById('category').value;
      const c1 = document.getElementById('content1').value.trim();
      const c2 = document.getElementById('content2').value.trim();
      const c3 = document.getElementById('content3').value.trim();
      const cap1 = getFullCaption(document.getElementById('image1_caption').value);
      const cap2 = getFullCaption(document.getElementById('image2_caption').value);
      const cap3 = getFullCaption(document.getElementById('image3_caption').value);
      const f1 = document.getElementById('image1').files[0];
      const f2 = document.getElementById('image2').files[0];
      const f3 = document.getElementById('image3').files[0];
      const loaded = window._loadedImages || {};

      let html = `<h1>${title}</h1>`;
      if (subtitle) html += `<p class="preview-subtitle">${subtitle}</p>`;
      const authorDisplay = (author && author !== '기자') ? author + ' 기자' : author;
      html += `<p class="preview-meta">${category ? category + ' | ' : ''}${authorDisplay}</p><div class="preview-body">`;

      const addBlock = (imgFile, imgBase64, content, caption) => {
        if (imgFile) {
          const url = URL.createObjectURL(imgFile);
          html += `<img src="${url}" alt="" class="preview-img" onload="URL.revokeObjectURL(this.src)" />`;
        } else if (imgBase64) {
          html += `<img src="${imgBase64}" alt="" class="preview-img" />`;
        }
        if (caption) html += `<p class="preview-img-caption">${caption.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>`;
        if (content) html += `<p>${content.replace(/\n/g, '</p><p>')}</p>`;
      };
      addBlock(f1, loaded.image1, c1, cap1);
      addBlock(f2, loaded.image2, c2, cap2);
      addBlock(f3, loaded.image3, c3, cap3);

      html += '</div>';
      document.getElementById('previewContent').innerHTML = html;
      document.getElementById('previewModal').classList.add('show');
    }

    document.getElementById('btnPreview').addEventListener('click', showPreview);
    document.getElementById('previewModalClose').addEventListener('click', () => {
      document.getElementById('previewModal').classList.remove('show');
    });
    document.getElementById('previewModal').addEventListener('click', (e) => {
      if (e.target.id === 'previewModal') e.target.classList.remove('show');
    });

    // 임시저장/작성완료: 원문+이미지 동시 저장 후 현재 페이지 유지
    document.getElementById('btnDraft').addEventListener('click', (e) => { e.preventDefault(); saveArticle('draft'); });
    document.getElementById('btnComplete').addEventListener('click', (e) => { e.preventDefault(); saveArticle('pending'); });
    // 송고: 저장 성공 시 기자 대시보드로 이동
    document.getElementById('btnSubmit').addEventListener('click', (e) => { e.preventDefault(); saveArticle('pending', { redirectToDashboard: true }); });

    /** 백엔드 spell-check.js 와 동일 구분자 */
    const BODY_SECTION_DELIM = '\n<<<NW_BODY_SPLIT>>>\n';

    /**
     * 리치텍스트 본문: 나중에 contenteditable 등을 쓸 때
     * 폼 안에 data-spell-body="1" 인 요소가 있으면 innerText 로 수집·반영합니다.
     */
    function getRichSpellBodyEl() {
      return document.querySelector('#articleForm [contenteditable="true"][data-spell-body="1"]');
    }

    function collectPlainBodySections() {
      const rich = getRichSpellBodyEl();
      if (rich) {
        const t = rich.innerText || '';
        return { body: t, mode: 'richtext', richEl: rich };
      }
      const c1 = document.getElementById('content1').value;
      const c2 = document.getElementById('content2').value;
      const c3 = document.getElementById('content3').value;
      return {
        body: [c1, c2, c3].join(BODY_SECTION_DELIM),
        mode: 'plain',
        richEl: null
      };
    }

    function collectSpellPayload() {
      const title = document.getElementById('title').value.trim();
      const subtitle = document.getElementById('subtitle').value.trim();
      const { body, mode, richEl } = collectPlainBodySections();
      return { title, subtitle, body, mode, richEl };
    }

    let lastSpellResult = null;
    /** @type {'plain'|'richtext'} */
    let lastSpellBodyMode = 'plain';

    function spellEditPanelCollapse() {
      const panel = document.getElementById('spellEditPanel');
      const btn = document.getElementById('spellToggleEdit');
      panel.classList.add('is-collapsed');
      panel.setAttribute('aria-hidden', 'true');
      if (btn) btn.textContent = '직접수정';
    }

    function spellEditPanelExpand() {
      const panel = document.getElementById('spellEditPanel');
      const btn = document.getElementById('spellToggleEdit');
      panel.classList.remove('is-collapsed');
      panel.setAttribute('aria-hidden', 'false');
      if (btn) btn.textContent = '교정 비교만 보기';
      const first = document.getElementById('spellEditTitle');
      if (first) setTimeout(() => first.focus(), 50);
    }

    function updateSpellEditBodyLayout() {
      const plainWrap = document.getElementById('spellEditBodyPlainWrap');
      const richWrap = document.getElementById('spellEditBodyRichWrap');
      const isRich = lastSpellBodyMode === 'richtext';
      plainWrap.hidden = isRich;
      richWrap.hidden = !isRich;
    }

    function populateSpellEditFromResult(data) {
      if (!data) return;
      const tEl = document.getElementById('spellEditTitle');
      const sEl = document.getElementById('spellEditSubtitle');
      if (tEl) tEl.value = data.title && data.title.corrected != null ? data.title.corrected : '';
      if (sEl) sEl.value = data.subtitle && data.subtitle.corrected != null ? data.subtitle.corrected : '';
      const parts =
        data.body && Array.isArray(data.body.partsCorrected) ? data.body.partsCorrected : ['', '', ''];
      updateSpellEditBodyLayout();
      if (lastSpellBodyMode === 'richtext') {
        const ta = document.getElementById('spellEditBodyRich');
        if (ta) ta.value = data.body && data.body.corrected != null ? data.body.corrected : '';
      } else {
        const ids = ['spellEditBody1', 'spellEditBody2', 'spellEditBody3'];
        ids.forEach((id, i) => {
          const el = document.getElementById(id);
          if (el) el.value = parts[i] != null ? parts[i] : '';
        });
      }
    }

    function setSpellStatus(text, cls) {
      const el = document.getElementById('spellStatus');
      el.textContent = text || '';
      el.className = 'spell-status' + (cls ? ' ' + cls : '');
    }

    function closeSpellModal() {
      spellEditPanelCollapse();
      document.getElementById('spellModal').classList.remove('show');
      document.getElementById('spellModal').setAttribute('aria-hidden', 'true');
    }

    function openSpellModal() {
      document.getElementById('spellModal').classList.add('show');
      document.getElementById('spellModal').setAttribute('aria-hidden', 'false');
    }

    function renderSpellCompare(data) {
      const root = document.getElementById('spellCompareRoot');
      if (!data) {
        root.innerHTML = '';
        return;
      }
      const block = (label, fieldKey) => {
        const f = data[fieldKey];
        if (!f) return '';
        const orig = f.original != null ? f.original : '';
        const html = f.html != null ? f.html : '';
        return (
          '<section class="spell-field-block">' +
          '<h3 class="spell-field-title">' + label + (f.changed ? ' <span class="spell-changed" style="font-size:12px;">교정 있음</span>' : '') + '</h3>' +
          '<div class="spell-compare-row">' +
          '<div class="spell-col"><div class="spell-col-label">원문</div><pre class="spell-plain">' +
          String(orig).replace(/&/g, '&amp;').replace(/</g, '&lt;') +
          '</pre></div>' +
          '<div class="spell-col"><div class="spell-col-label">교정</div><div class="spell-corrected-html">' +
          html +
          '</div></div></div></section>'
        );
      };
      root.innerHTML =
        block('제목', 'title') +
        block('부제목', 'subtitle') +
        block('본문 (내용 1 · 2 · 3)', 'body');
    }

    function applySpellToForm(which) {
      if (!lastSpellResult) return;
      const titleEdited = document.getElementById('spellEditTitle').value;
      const subtitleEdited = document.getElementById('spellEditSubtitle').value;
      if (which === 'all' || which === 'title') {
        document.getElementById('title').value = titleEdited;
      }
      if (which === 'all' || which === 'subtitle') {
        document.getElementById('subtitle').value = subtitleEdited;
      }
      if (which === 'all' || which === 'body') {
        const rich = getRichSpellBodyEl();
        if (rich) {
          const v = document.getElementById('spellEditBodyRich').value;
          rich.innerText = v;
        } else {
          const p0 = document.getElementById('spellEditBody1').value;
          const p1 = document.getElementById('spellEditBody2').value;
          const p2 = document.getElementById('spellEditBody3').value;
          document.getElementById('content1').value = p0;
          document.getElementById('content2').value = p1;
          document.getElementById('content3').value = p2;
        }
      }
      showErr('');
      closeSpellModal();
      alert('교정 문안을 폼에 반영했습니다. 필요 시 다시 검사해 주세요.');
    }

    document.getElementById('spellModalClose').addEventListener('click', closeSpellModal);
    document.getElementById('spellModalCloseBtn').addEventListener('click', closeSpellModal);
    document.getElementById('spellModal').addEventListener('click', (e) => {
      if (e.target.id === 'spellModal') closeSpellModal();
    });
    document.getElementById('spellApplyAll').addEventListener('click', () => applySpellToForm('all'));
    document.getElementById('spellApplyTitle').addEventListener('click', () => applySpellToForm('title'));
    document.getElementById('spellApplySubtitle').addEventListener('click', () => applySpellToForm('subtitle'));
    document.getElementById('spellApplyBody').addEventListener('click', () => applySpellToForm('body'));

    document.getElementById('spellToggleEdit').addEventListener('click', () => {
      const panel = document.getElementById('spellEditPanel');
      if (!lastSpellResult) return;
      if (panel.classList.contains('is-collapsed')) spellEditPanelExpand();
      else spellEditPanelCollapse();
    });

    document.getElementById('btnSpell').addEventListener('click', async () => {
      const btn = document.getElementById('btnSpell');
      const { title, subtitle, body, mode } = collectSpellPayload();
      lastSpellBodyMode = mode === 'richtext' ? 'richtext' : 'plain';
      if (!title && !subtitle && !body.trim()) {
        alert('제목·부제목·본문 중 최소 한 곳에 입력한 뒤 맞춤법 검사를 실행해 주세요.');
        return;
      }
      setSpellStatus('검사 중입니다…', 'is-loading');
      lastSpellResult = null;
      document.getElementById('spellCompareRoot').innerHTML = '';
      spellEditPanelCollapse();
      openSpellModal();
      btn.disabled = true;
      try {
        const res = await fetch(`${API}/api/spell-check/article`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json; charset=utf-8',
            Authorization: 'Bearer ' + token
          },
          body: JSON.stringify({ title, subtitle, body })
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) {
          closeSpellModal();
          window.location.href = 'login.html?role=reporter';
          return;
        }
        if (!res.ok) {
          setSpellStatus(data.error || '검사 요청에 실패했습니다.', 'is-err');
          return;
        }
        lastSpellResult = data;
        renderSpellCompare(data);
        populateSpellEditFromResult(data);
        const any =
          (data.title && data.title.changed) ||
          (data.subtitle && data.subtitle.changed) ||
          (data.body && data.body.changed);
        if (any) {
          setSpellStatus('교정 제안이 있습니다. 아래를 확인한 뒤 반영 범위를 선택하세요.', 'is-ok');
        } else {
          setSpellStatus('샘플 규칙 기준으로 추가 교정 사항이 없습니다. (입력하신 문장 그대로입니다.)', 'is-ok');
        }
      } catch (e) {
        setSpellStatus('서버에 연결할 수 없습니다. 백엔드가 실행 중인지 확인해 주세요.', 'is-err');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
