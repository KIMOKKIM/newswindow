<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스태프 로그인 - 뉴스의창</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .nw-wrap { max-width: 400px; margin: 60px auto; padding: 0 20px; }
    .nw-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; text-align: center; }
    .nw-form .row { margin-bottom: 14px; }
    .nw-form label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: 600; }
    .nw-form input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .nw-form button { width: 100%; padding: 12px; background: #2d7dd2; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .nw-form button:hover { background: #246bb8; }
    .nw-form .error { color: #c00; font-size: 13px; margin-top: 8px; }
    .nw-back { text-align: center; margin-top: 16px; }
    .nw-back a { color: #2d7dd2; }
  </style>
</head>
<body>
  <div class="nw-wrap">
    <h1 class="nw-title">스태프 로그인</h1>
    <form class="nw-form" id="loginForm">
      <div class="row">
        <label>아이디</label>
        <input type="text" id="userid" name="userid" required placeholder="아이디 입력" />
      </div>
      <div class="row">
        <label>비밀번호</label>
        <input type="password" id="password" name="password" required placeholder="비밀번호 입력" />
      </div>
      <div id="errorMsg" class="error" style="display:none;"></div>
      <button type="submit">로그인</button>
    </form>
    <div class="nw-back"><a href="index.html">← 스태프 선택으로 돌아가기</a></div>
  </div>

  <script>
    const API = 'http://127.0.0.1:3001';
    const params = new URLSearchParams(location.search);
    const role = params.get('role');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userid = document.getElementById('userid').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userid, password })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          err.textContent = data.error || '로그인 실패';
          err.style.display = 'block';
          return;
        }
        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('role', data.role);
        localStorage.setItem('name', data.name || '');

        // 역할에 따라 관리자 → 관리자 대시보드, 편집장 → 편집장 대시보드, 기자 → 기자 대시보드
        const r = (data.role || '').toString().trim().toLowerCase();
        if (r === 'admin') {
          window.location.href = 'admin.html';
        } else if (r === 'editor_in_chief') {
          window.location.href = 'editor.html';
        } else if (r === 'reporter') {
          window.location.href = 'reporter.html';
        } else {
          window.location.href = 'index.html';
        }
      } catch (e) {
        err.textContent = '서버에 연결할 수 없습니다.';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
