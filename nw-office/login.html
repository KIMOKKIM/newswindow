<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function () {
      var role = '';
      try {
        role = (new URLSearchParams(location.search || '').get('role') || '').trim().toLowerCase().replace(/-/g, '_');
      } catch (e) {}
      var t = '/admin';
      if (role === 'reporter') t = '/admin/reporter/login';
      else if (role === 'editor_in_chief' || role === 'editor') t = '/admin/editor/login';
      else if (role === 'admin') t = '/admin/admin/login';
      location.replace(t);
    })();
  </script>
  <title>스태프 로그인 - 뉴스의창</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .nw-wrap { max-width: 400px; margin: 60px auto; padding: 0 20px; }
    .nw-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; text-align: center; }
    .nw-form .row { margin-bottom: 14px; }
    .nw-form label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: 600; }
    .nw-form input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .nw-form button { width: 100%; padding: 12px; background: #2d7dd2; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .nw-form button:hover { background: #246bb8; }
    .nw-form .error { color: #c00; font-size: 13px; margin-top: 8px; }
    .nw-back { text-align: center; margin-top: 16px; }
    .nw-back a { color: #2d7dd2; }
  </style>
</head>
<body>
  <div class="nw-wrap">
    <h1 class="nw-title">스태프 로그인</h1>
    <form class="nw-form" id="loginForm">
      <div class="row">
        <label>아이디</label>
        <input type="text" id="userid" name="userid" required placeholder="아이디 입력" />
      </div>
      <div class="row">
        <label>비밀번호</label>
        <input type="password" id="password" name="password" required placeholder="비밀번호 입력" />
      </div>
      <div id="errorMsg" class="error" style="display:none;"></div>
      <button type="submit">로그인</button>
    </form>
    <div class="nw-back"><a href="/admin">← 스태프 포털로 이동</a> · JS를 켜 주세요.</div>
  </div>

  <script src="js/nw-auth.js"></script>
  <script>
    const API_ROOT = (function () {
      try {
        const host = String((location && location.hostname) ? location.hostname : '').trim();
        const h = host.toLowerCase();
        if (!h) return 'http://127.0.0.1:3000/api';
        if (h === 'localhost' || h === '127.0.0.1' || h === '::1') return 'http://127.0.0.1:3000/api';
        if (/^192\.168\.\d{1,3}\.\d{1,3}$/.test(h) || /^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(h)) return 'http://127.0.0.1:3000/api';
        return '/api';
      } catch (e) {
        return 'http://127.0.0.1:3000/api';
      }
    })();
    const LOGIN_DEBUG =
      (typeof location !== 'undefined' && /(?:^|[?&])nwdebug=1(?:&|$)/.test(location.search)) ||
      (typeof localStorage !== 'undefined' && localStorage.getItem('nwOfficeDebug') === '1');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userid = document.getElementById('userid').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      err.style.display = 'none';
      if (submitBtn) submitBtn.disabled = true;

      try {
        if (LOGIN_DEBUG) console.info('[auth] login request start', { url: API_ROOT + '/auth/login', useridLen: userid.length });

        const res = await fetch(`${API_ROOT}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userid, password }),
        });

        let data = await res.json().catch(() => null);
        if (!data || typeof data !== 'object') data = {};

        if (LOGIN_DEBUG) {
          console.info('[auth] login response', { status: res.status, ok: res.ok });
        }

        if (!res.ok) {
          err.textContent = data.error || '로그인 실패';
          err.style.display = 'block';
          return;
        }

        const session = window.NwAuth.setSessionFromLogin(data);
        if (!session) {
          err.textContent = data.error || '세션을 저장할 수 없습니다. 응답을 확인해 주세요.';
          err.style.display = 'block';
          if (LOGIN_DEBUG) console.warn('[auth] setSessionFromLogin failed', data);
          return;
        }

        const path = window.NwAuth.dashboardPathForRole(session.role);
        if (LOGIN_DEBUG) {
          console.info('[auth] redirect target', { role: session.role, path, reason: 'login_ok' });
        }
        window.location.replace(path);
      } catch (ex) {
        if (LOGIN_DEBUG) console.error('[auth] login submit error', ex);
        err.textContent = '서버에 연결할 수 없습니다.';
        err.style.display = 'block';
      } finally {
        if (submitBtn) submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
