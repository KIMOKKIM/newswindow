<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스태프 회원가입 - 뉴스의창</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js" async></script>
  <style>
    .nw-wrap { max-width: 420px; margin: 40px auto; padding: 0 20px; }
    .nw-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; text-align: center; }
    .nw-form .row { margin-bottom: 14px; }
    .nw-form label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: 600; }
    .nw-form input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .nw-form .dup-row { display: flex; gap: 8px; }
    .nw-form .dup-row input { flex: 1; }
    .nw-form button[type="submit"] { width: 100%; padding: 12px; background: #2d7dd2; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; }
    .nw-form button[type="button"] { padding: 10px 16px; background: #606a80; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .nw-form .error, .nw-form .msg { font-size: 13px; margin-top: 6px; }
    .nw-form .error { color: #c00; }
    .nw-form .msg { color: #2d7dd2; }
    .nw-form .form-note { font-size: 12px; color: #666; margin-top: 4px; }
    .nw-form .ssn-row, .nw-form .email-row { display: flex; gap: 8px; align-items: center; }
    .nw-form .ssn-row input { flex: 0 1 80px; text-align: center; }
    .nw-form .email-row input { flex: 1; }
    .nw-form .email-row select { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; background: #fff; }
    .nw-form .email-row .domain-direct { flex: 1; }
    .nw-form .email-row span { color: #666; }
    .nw-form .ssn-row span { color: #999; }
    .nw-form .addr-row { display: flex; gap: 8px; flex: 1; }
    .nw-form .addr-row input { flex: 1; }
    .nw-form .addr-row button { flex: 0 0 auto; padding: 10px 16px; background: #606a80; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    #postcode-layer { display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:420px; max-width:90%; height:460px; z-index:1000; border:1px solid #333; background:#fff; box-shadow:0 8px 24px rgba(0,0,0,.25); }
    #postcode-layer .close-btn { display:block; text-align:right; padding:4px 8px; background:#2d7dd2; color:#fff; font-size:12px; cursor:pointer; }
    .nw-back { text-align: center; margin-top: 16px; }
    .nw-back a { color: #2d7dd2; }
    .nw-hide { display: none !important; }
  </style>
</head>
<body>
  <div id="postcode-layer">
    <div class="close-btn" id="postcode-close">닫기 ✕</div>
    <div id="postcode-embed" style="width:100%;height:430px;"></div>
  </div>
  <div class="nw-wrap">
    <h1 class="nw-title" id="pageTitle">스태프 회원가입</h1>
    <form class="nw-form" id="signupForm" novalidate>
      <div class="row">
        <label>아이디</label>
        <div class="dup-row nw-hide" id="dupRow">
          <input type="text" id="userid" name="userid" required placeholder="아이디 입력" />
          <button type="button" id="btnCheck">중복확인</button>
        </div>
        <input type="text" id="useridPlain" name="userid" required placeholder="아이디 입력" class="nw-hide" />
        <span id="dupMsg" class="msg"></span>
      </div>
      <div class="row">
        <label>비밀번호</label>
        <input type="password" id="password" name="password" required placeholder="비밀번호 입력" />
        <p class="form-note">영문, 특수문자, 숫자 사용 8자 이상</p>
      </div>
      <div class="row">
        <label>비밀번호확인</label>
        <input type="password" id="passwordConfirm" name="passwordConfirm" required placeholder="비밀번호 확인" />
        <span id="pwdMatchMsg" class="msg" style="display:none;"></span>
      </div>
      <div class="row">
        <label>이름</label>
        <input type="text" id="name" name="name" required placeholder="이름" />
      </div>
      <div class="row">
        <label>이메일</label>
        <div class="email-row">
          <input type="text" id="emailId" placeholder="이메일 아이디" />
          <span>@</span>
          <select id="emailDomainSelect">
            <option value="">도메인 선택</option>
            <option value="naver.com">naver.com</option>
            <option value="gmail.com">gmail.com</option>
            <option value="daum.net">daum.net</option>
            <option value="hanmail.net">hanmail.net</option>
            <option value="nate.com">nate.com</option>
            <option value="kakao.com">kakao.com</option>
            <option value="hotmail.com">hotmail.com</option>
            <option value="yahoo.co.kr">yahoo.co.kr</option>
            <option value="_direct">직접입력</option>
          </select>
          <span id="emailDomainWrap" class="nw-hide" style="flex:1;display:flex;gap:4px;">
            <input type="text" id="emailDomainDirect" class="domain-direct" placeholder="도메인 입력" style="flex:1" />
            <button type="button" id="emailDomainBack" style="padding:6px 10px;font-size:12px;background:#777;color:#fff;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;">선택</button>
          </span>
        </div>
      </div>
      <div class="row nw-hide" id="reporterExtra">
        <label>주민번호</label>
        <div class="ssn-row">
          <input type="text" id="ssn1" placeholder="앞 6자리" maxlength="6" pattern="[0-9]*" inputmode="numeric" />
          <span>-</span>
          <input type="text" id="ssn2" placeholder="뒤 7자리" maxlength="7" inputmode="numeric" data-masked />
        </div>
      </div>
      <div class="row nw-hide" id="reporterExtra2">
        <label>전화번호</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
      </div>
      <div class="row nw-hide" id="reporterExtra3">
        <label>주소</label>
        <div class="addr-row">
          <input type="text" id="postcode" placeholder="우편번호" readonly />
          <button type="button" id="btnAddress" class="nw-hide">찾기</button>
        </div>
      </div>
      <div class="row nw-hide" id="reporterExtra4">
        <label></label>
        <input type="text" id="address" placeholder="기본주소" readonly />
      </div>
      <div class="row nw-hide" id="reporterExtra5">
        <label>상세주소</label>
        <input type="text" id="addressDetail" placeholder="상세주소 입력 (동, 호수 등)" />
      </div>
      <div id="errorMsg" class="error" style="display:none;"></div>
      <button type="submit">회원가입</button>
    </form>
    <div class="nw-back"><a href="index.html">← 스태프 선택으로 돌아가기</a></div>
  </div>

  <script>
    const API = 'http://127.0.0.1:3001';
    const params = new URLSearchParams(location.search);
    const roleParam = params.get('role');

    if (!['reporter', 'editor_in_chief'].includes(roleParam)) {
      document.getElementById('pageTitle').textContent = '회원가입 - 역할을 선택해주세요';
      document.getElementById('signupForm').innerHTML = '<p>기자 또는 편집장 회원가입은 <a href="index.html">스태프 선택</a>에서 해당 카드의 회원가입 버튼을 눌러주세요.</p>';
    } else {
      const titleMap = { reporter: '기자', editor_in_chief: '편집장' };
      document.getElementById('pageTitle').textContent = titleMap[roleParam] + ' 회원가입';

      const useridInput = roleParam === 'reporter' ? document.getElementById('userid') : document.getElementById('useridPlain');
      const dupRow = document.getElementById('dupRow');
      if (roleParam === 'reporter') {
        dupRow.classList.remove('nw-hide');
        document.getElementById('useridPlain').classList.add('nw-hide');
        ['reporterExtra', 'reporterExtra2', 'reporterExtra3', 'reporterExtra4', 'reporterExtra5'].forEach(id => document.getElementById(id).classList.remove('nw-hide'));
        document.getElementById('btnAddress').classList.remove('nw-hide');
      } else {
        document.getElementById('useridPlain').classList.remove('nw-hide');
        document.getElementById('useridPlain').name = 'userid';
      }
      if (roleParam === 'reporter') {
        document.getElementById('btnAddress').addEventListener('click', () => {
          if (!window.daum || !window.daum.Postcode) { alert('주소 검색 서비스를 불러올 수 없습니다.'); return; }
          new daum.Postcode({
            oncomplete: function (data) {
              document.getElementById('postcode').value = data.zonecode || '';
              document.getElementById('address').value = (data.roadAddress || data.jibunAddress) || '';
              document.getElementById('addressDetail').placeholder = '상세주소 입력 (동, 호수 등)';
              document.getElementById('postcode-layer').style.display = 'none';
            }
          }).embed(document.getElementById('postcode-embed'));
          document.getElementById('postcode-layer').style.display = 'block';
        });
        document.getElementById('postcode-close').addEventListener('click', () => { document.getElementById('postcode-layer').style.display = 'none'; });
        document.getElementById('phone').addEventListener('input', function () {
          let v = this.value.replace(/\D/g, '').slice(0, 11);
          if (v.length > 0 && v[0] !== '0') v = '0' + v;
          if (v.startsWith('010') && v.length > 3) {
            this.value = '010-' + v.slice(3, 7) + (v.length > 7 ? '-' + v.slice(7) : '');
          } else {
            this.value = v;
          }
        });
      }
      const domainSelect = document.getElementById('emailDomainSelect');
      const domainDirect = document.getElementById('emailDomainDirect');
      const domainBack = document.getElementById('emailDomainBack');
      domainSelect.addEventListener('change', function () {
        if (this.value === '_direct') {
          this.classList.add('nw-hide');
          document.getElementById('emailDomainWrap').classList.remove('nw-hide');
          domainDirect.value = '';
          domainDirect.focus();
        } else {
          document.getElementById('emailDomainWrap').classList.add('nw-hide');
          domainSelect.classList.remove('nw-hide');
        }
      });
      domainBack.addEventListener('click', function () {
        document.getElementById('emailDomainWrap').classList.add('nw-hide');
        domainSelect.classList.remove('nw-hide');
        domainSelect.value = '';
      });

      function checkPwdMatch() {
        const pwd = document.getElementById('password').value;
        const confirm = document.getElementById('passwordConfirm').value;
        const msg = document.getElementById('pwdMatchMsg');
        if (!confirm) { msg.style.display = 'none'; return; }
        msg.style.display = 'inline';
        if (pwd === confirm) {
          msg.textContent = '비밀번호가 일치합니다.';
          msg.className = 'msg';
        } else {
          msg.textContent = '비밀번호가 일치하지 않습니다.';
          msg.className = 'msg error';
        }
      }
      document.getElementById('password').addEventListener('input', checkPwdMatch);
      document.getElementById('password').addEventListener('change', checkPwdMatch);
      document.getElementById('passwordConfirm').addEventListener('input', checkPwdMatch);
      document.getElementById('passwordConfirm').addEventListener('change', checkPwdMatch);

      let ssn2Real = '';
      if (roleParam === 'reporter') {
        const ssn2El = document.getElementById('ssn2');
        ssn2El.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace') {
            ssn2Real = ssn2Real.slice(0, -1);
            ssn2El.value = '*'.repeat(ssn2Real.length);
            e.preventDefault();
            return;
          }
          if (e.key.length === 1 && /[0-9]/.test(e.key) && ssn2Real.length < 7) {
            ssn2Real += e.key;
            ssn2El.value = '*'.repeat(ssn2Real.length);
            e.preventDefault();
          }
        });
        ssn2El.addEventListener('paste', (e) => {
          e.preventDefault();
          const pasted = (e.clipboardData?.getData('text') || '').replace(/\D/g, '');
          ssn2Real = (ssn2Real + pasted).slice(0, 7);
          ssn2El.value = '*'.repeat(ssn2Real.length);
        });
        document.getElementById('btnCheck').addEventListener('click', async () => {
          const uid = document.getElementById('userid').value.trim();
          const msg = document.getElementById('dupMsg');
          if (!uid) { msg.textContent = '아이디를 입력하세요.'; msg.className = 'msg error'; return; }
          try {
            const r = await fetch(`${API}/api/users/check?userid=${encodeURIComponent(uid)}`);
            const d = await r.json();
            msg.textContent = d.available ? '사용 가능한 아이디입니다.' : '이미 사용 중인 아이디입니다.';
            msg.className = 'msg' + (d.available ? '' : ' error');
          } catch {
            msg.textContent = '서버 연결 실패'; msg.className = 'msg error';
          }
        });
      }

      function isValidPassword(pw) {
        if (pw.length < 8) return false;
        const hasLetter = /[a-zA-Z]/.test(pw);
        const hasNumber = /[0-9]/.test(pw);
        const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(pw);
        return hasLetter && hasNumber && hasSpecial;
      }

      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        e.stopPropagation();
        const userid = (roleParam === 'reporter' ? document.getElementById('userid') : document.getElementById('useridPlain')).value.trim();
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        const name = document.getElementById('name').value.trim();
        const emailId = document.getElementById('emailId').value.trim();
        const domainSelect = document.getElementById('emailDomainSelect');
        const domainDirect = document.getElementById('emailDomainDirect');
        const emailDomain = domainSelect.value === '_direct' ? domainDirect.value.trim() : (domainSelect.value || '').trim();
        const email = (emailId && emailDomain) ? emailId + '@' + emailDomain : '';
        const err = document.getElementById('errorMsg');
        err.style.display = 'none';

        if (!email) {
          err.textContent = '이메일 아이디와 도메인을 입력해주세요.';
          err.style.display = 'block';
          return;
        }
        if (!isValidPassword(password)) {
          err.textContent = '비밀번호는 영문, 특수문자, 숫자를 사용하여 8자 이상으로 입력해주세요.';
          err.style.display = 'block';
          return;
        }
        if (password !== passwordConfirm) {
          err.textContent = '비밀번호가 일치하지 않습니다.';
          err.style.display = 'block';
          return;
        }

        const payload = { userid, password, name, email, role: roleParam };
        if (roleParam === 'reporter') {
          const s1 = document.getElementById('ssn1').value.trim();
          const s2 = ssn2Real;
          payload.ssn = (s1 && s2) ? s1 + '-' + s2 : '';
          payload.phone = document.getElementById('phone').value.trim();
          const postcode = document.getElementById('postcode').value.trim();
          const addr = document.getElementById('address').value.trim();
          const addrDetail = document.getElementById('addressDetail').value.trim();
          payload.address = [postcode, addr, addrDetail].filter(Boolean).join(' ');
        }

        try {
          const res = await fetch(`${API}/api/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            err.textContent = data.error || '회원가입 실패';
            err.style.display = 'block';
            return;
          }
          const msg = (roleParam === 'reporter' || roleParam === 'editor_in_chief')
            ? '회원가입이 완료되었습니다. 편집장 및 관리자 대시보드 기자리스트에 반영됩니다. 로그인 페이지로 이동합니다.'
            : '회원가입이 완료되었습니다. 로그인 페이지로 이동합니다.';
          alert(msg);
          window.location.href = `login.html?role=${roleParam}`;
        } catch (e) {
          err.textContent = '서버에 연결할 수 없습니다. (백엔드 실행 여부 확인: http://127.0.0.1:3001) - ' + (e.message || String(e));
          err.style.display = 'block';
        }
      });
    }
  </script>
</body>
</html>
