<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드 - 뉴스의창</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .nw-wrap { max-width: 900px; margin: 24px auto; padding: 0 20px; }
    .nw-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .nw-title { font-size: 20px; font-weight: 700; }
    .nw-logout { color: #2d7dd2; cursor: pointer; }
    .nw-table { width: 100%; border-collapse: collapse; border: 1px solid #ddd; }
    .nw-table th, .nw-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
    .nw-table th { background: #f5f5f5; font-weight: 600; }
    .nw-table select { padding: 4px 8px; }
  </style>
</head>
<body>
  <div class="nw-wrap">
    <div class="nw-header">
      <h1 class="nw-title">관리자 대시보드</h1>
      <span class="nw-logout" id="logout">로그아웃</span>
    </div>
    <p>등록된 사용자 목록 (역할 변경 가능)</p>
    <table class="nw-table">
      <thead>
        <tr><th>아이디</th><th>이름</th><th>이메일</th><th>역할</th><th>가입일</th><th>변경</th></tr>
      </thead>
      <tbody id="userList"></tbody>
    </table>
  </div>
  <script>
    const API = 'http://127.0.0.1:3001';
    const token = localStorage.getItem('accessToken');
    const role = localStorage.getItem('role');

    if (!token || role !== 'admin') {
      window.location.href = 'login.html?role=admin';
    }

    document.getElementById('logout').addEventListener('click', () => {
      localStorage.removeItem('accessToken');
      localStorage.removeItem('role');
      localStorage.removeItem('name');
      window.location.href = 'index.html';
    });

    async function loadUsers() {
      const res = await fetch(`${API}/api/users`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res.status === 401) { window.location.href = 'login.html?role=admin'; return; }
      const users = await res.json();
      const tbody = document.getElementById('userList');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.userid}</td>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td>
            <select data-id="${u.id}" ${u.role === 'admin' ? 'disabled' : ''}>
              <option value="reporter" ${u.role === 'reporter' ? 'selected' : ''}>기자</option>
              <option value="editor_in_chief" ${u.role === 'editor_in_chief' ? 'selected' : ''}>편집장</option>
              <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>관리자</option>
            </select>
          </td>
          <td>${u.created_at ? u.created_at.slice(0, 10) : ''}</td>
          <td>
            ${u.role !== 'admin' ? '<button type="button" class="btn-update" data-id="' + u.id + '">변경</button>' : '-'}
          </td>
        </tr>
      `).join('');

      tbody.querySelectorAll('.btn-update').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const select = tbody.querySelector(`select[data-id="${id}"]`);
          const newRole = select.value;
          const r = await fetch(`${API}/api/users/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ role: newRole })
          });
          if (r.ok) { alert('역할이 변경되었습니다.'); loadUsers(); }
          else { const d = await r.json(); alert(d.error || '실패'); }
        });
      });
    }

    loadUsers();
  </script>
</body>
</html>
