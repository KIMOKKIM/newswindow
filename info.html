          <h2 style="font-size:20px;">10. 개인정보보호를 위한 기술적, 관리적 대책</h2>

          <p>회사는 개인정보보호를 위한 기술적, 관리적 대책을 다음과 같이 시행하고 있습니다.</p>

            <li>해킹 방지를 위한 방화벽과 보안시스템에 만전을 기하고 있습니다.</li>
            <li>개인정보 송수신시 SSL 보안서버 인증서를 설치하여 정보를 보호합니다.</li>
            <li>개인정보에의 접근은 해당 업무 수행자, 업무 수행 시 개인정보 취급이 불가피한 자로 제한하여 그 이외의 직원이 접근하지 못하도록 하고 있습니다.</li>
            <li>개인정보취급자의 경우 정기 및 수시로 교육을 실시하고 있습니다.</li>
            <li>개인정보처리시스템의 접속 기록을 유지하고 이를 정기적으로 확인 감독하고 있습니다.</li>

        // token is provided by reCAPTCHA callbacks
        window.__reportRecaptchaToken = '';

        window.onReportRecaptchaSuccess = function (token) {
          window.__reportRecaptchaToken = token || '';
          validate();
        };
        window.onReportRecaptchaExpired = function () {
          window.__reportRecaptchaToken = '';
          validate();
        };
        window.onReportRecaptchaError = function () {
          window.__reportRecaptchaToken = '';
          validate();
        };

        const validate = () => {
          const okReq = requiredIds.every(id => {
            const el = document.getElementById(id);
            return el && String(el.value || '').trim().length > 0;
          });
          const okAgree = !!(agree && agree.checked);
          const okCaptcha = !!window.__reportRecaptchaToken;
          submit.disabled = !(okAgree && okReq && okCaptcha);
        };
        if (agree) agree.addEventListener('change', validate);
        requiredIds.forEach(id => {

            validate();
            if (submit.disabled) return;
            const payload = {

              tel: document.getElementById('r_tel').value.trim(),

              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: payload.token })

              .then(({ ok, json }) => {
                if (!ok || !json.ok) {

                alert('기사제보가 접수되었습니다.');
                ['r_title','r_body','r_company'].forEach(id => { const el=document.getElementById(id); if (el) el.value=''; });
                // reset captcha to require re-check
                try { if (window.grecaptcha) window.grecaptcha.reset(); } catch {}
                window.__reportRecaptchaToken = '';
                validate();
              })
              .catch(err => {
                alert('서버 통신 오류: ' + err.message);
              });
          });
        }
      }
    }

    // sidebar event
    document.getElementById('sidebar').addEventListener('click', function(e){
      const a = e.target.closest('a');
      if (!a) return;
      e.preventDefault();
      const page = a.dataset.page;
      history.pushState({page}, '', 'info.html?page='+page);
      render(page);
    });

    // On load: read query param
    (function(){
      const params = new URLSearchParams(location.search);
      const page = params.get('page') || 'company';
      render(page);
    })();
  </script>
</body>
</html>
